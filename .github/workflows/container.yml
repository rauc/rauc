name: build ci container

on:
  push:
    branches:
      - 'master'
      - 'container'
    paths:
      - '.github/workflows/container.yml'
      - 'test/Dockerfile'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      # needed for container push
      packages: write
    steps:
    - name: Install QEMU
      run: |
        sudo apt-get update
        DEBIAN_FRONTEND='noninteractive' sudo apt-get install -qy qemu-user-static
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - name: Build Images
      id: build-image
      uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2.13
      with:
        image: rauc-ci
        tags: latest
        platforms: linux/amd64, linux/386, linux/arm/v5, linux/arm/v7, linux/arm64/v8
        containerfiles: |
          ./test/Dockerfile
    - name: Echo Outputs for Build
      run: |
        echo "Image: ${{ steps.build-image.outputs.image }}"
        echo "Tags: ${{ steps.build-image.outputs.tags }}"
        echo "Tagged Image: ${{ steps.build-image.outputs.image-with-tag }}"
    - name: List Images
      run: |
        buildah images
    - name: Inspect Manifest
      run: |
        buildah manifest inspect "${{ steps.build-image.outputs.image-with-tag }}"
    - name: Push Images
      id: push-to-github
      uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2.8
      with:
        image: ${{ steps.build-image.outputs.image }}
        tags: ${{ steps.build-image.outputs.tags }}
        registry: ghcr.io/${{ github.repository }}
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - name: Echo Output for Push
      run: echo "Image pushed to ${{ steps.push-to-github.outputs.registry-paths }}"
